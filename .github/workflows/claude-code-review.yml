name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]

jobs:
  claude-review:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Run Claude Code Review
        id: review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          track_progress: true
          display_report: true
          additional_permissions: |
            actions: read
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            Perform a comprehensive code review with the following focus areas:

            1. **Code Quality**
            - Clean code principles and best practices
            - Proper error handling and edge cases
            - Code readability and maintainability

            2. **Security**
            - Check for potential security vulnerabilities
            - Validate input sanitization
            - Review authentication/authorization logic

            3. **Performance**
            - Identify potential performance bottlenecks
            - Check for memory leaks or resource issues

            4. **Testing**
            - Verify adequate test coverage (red/green TDD per CLAUDE.md)
            - Review test quality and edge cases
            - Check for missing test scenarios

            5. **YNAB/MCP conventions**
            - Tools must extend `YnabTool` and validate with Zod
            - Amounts in milliunits, dates in YYYY-MM-DD
            - Version bumps per semver in package.json for new tools / breaking changes
            - New tools registered in `src/tools/index.ts`

            Only comment on problems — do not praise things that are done correctly.
            Use `mcp__github_inline_comment__create_inline_comment` (with `confirmed: true`) for specific code issues.
            Keep feedback concise.

            On re-runs (synchronize events), check for unresolved review threads from previous reviews.
            If a previously flagged issue has been addressed in the new commits, resolve the thread using:
            `gh api graphql -f query='mutation { resolveReviewThread(input: {threadId: "THREAD_ID"}) { thread { isResolved } } }'`

            After completing your review, return structured output with:
            - `issue_count`: the number of issues you posted as inline comments
            - `summary`: a one-line summary of the review
          claude_args: |
            --max-turns 25
            --json-schema '{"type":"object","properties":{"issue_count":{"type":"number","description":"Total number of issues posted as inline comments"},"summary":{"type":"string","description":"One-line summary of the review"}},"required":["issue_count","summary"]}'
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh api:*),Read,Grep,Glob,Bash(git diff:*),Bash(git log:*)"

      - name: Fail if issues found
        if: steps.review.outputs.structured_output != ''
        run: |
          OUTPUT='${{ steps.review.outputs.structured_output }}'
          COUNT=$(echo "$OUTPUT" | jq -r '.issue_count')
          SUMMARY=$(echo "$OUTPUT" | jq -r '.summary')
          if [ "$COUNT" -gt 0 ]; then
            echo "::error::Claude found $COUNT issue(s): $SUMMARY"
            exit 1
          fi
          echo "Review passed: $SUMMARY"
